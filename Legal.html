  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ty websites. As such, you access any such third-party websites at your own risk.<\u002Fp>\n              <h3 style=\"margin: 0 0 8px; font-size: 18px; font-weight: 700; color: #F2F0FA;\">Changes to This Agreement<\u002Fh3>\n              <p style=\"margin: 0 0 20px; text-wrap: pretty;\">We reserve the right to modify this Agreement at any time. You should check this Agreement periodically for changes. By using Matterphor after we post any changes to this Agreement, you agree to accept those changes, whether or not you have reviewed them.<\u002Fp>\n              <h3 style=\"margin: 0 0 8px; font-size: 18px; font-weight: 700; color: #F2F0FA;\">Contact Us<\u002Fh3>\n              <p style=\"margin: 0; text-wrap: pretty;\">If you have any questions about this Agreement, please contact us at <span sc-camel-on-click=\"{{ copyEmail }}\" role=\"button\" sc-camel-tab-index=\"0\" style=\"position: relative; color: var(--ac); font-weight: 700; cursor: pointer;\" style-hover=\"color: #FFFFFF;\">info@matterphor.com<span data-copied-pop=\"\" style=\"position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(4px); opacity: 0; pointer-events: none; background: var(--ac); color: #0A0912; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 5px 10px; border-radius: 6px; white-space: nowrap; transition: opacity 0.25s ease, transform 0.25s ease;\">Copied to clipboard<\u002Fspan><\u002Fspan>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- FOOTER -->\n  <footer style=\"position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 34px clamp(20px, 4vw, 56px); border-top: 1px solid rgba(143,123,255,0.14);\">\n    <a href=\"index.html\" aria-label=\"Matterphor home\" style=\"display: inline-flex;\"><img src=\"385a9492-3dff-44bb-8e1e-29aa009d61d5\" alt=\"Matterphor\" style=\"height: 29px; width: auto; opacity: 0.85;\"><\u002Fa>\n    <div style=\"display: flex; flex-direction: column; gap: 14px; width: fit-content; max-width: 100%;\">\n    <nav style=\"display: flex; gap: 4px; font-size: clamp(11.5px, 2.9vw, 13px); justify-content: space-between; flex-wrap: nowrap; margin: 0 -4px;\">\n      <a href=\"index.html#services\" style=\"color: rgba(242,240,250,0.55); padding: 8px 4px; border-radius: 999px; white-space: nowrap;\" style-hover=\"color: var(--ac);\">Services<\u002Fa>\n      <a href=\"index.html#work\" style=\"color: rgba(242,240,250,0.55); padding: 8px 4px; border-radius: 999px; white-space: nowrap;\" style-hover=\"color: var(--ac);\">Work<\u002Fa>\n      <a href=\"index.html#team\" style=\"color: rgba(242,240,250,0.55); padding: 8px 4px; border-radius: 999px; white-space: nowrap;\" style-hover=\"color: var(--ac);\">About<\u002Fa>\n      <a href=\"Legal.html\" style=\"color: var(--ac); padding: 8px 4px; border-radius: 999px; white-space: nowrap;\" style-hover=\"color: #FFFFFF;\">Legal<\u002Fa>\n      <a href=\"index.html#contact\" style=\"color: rgba(242,240,250,0.55); padding: 8px 4px; border-radius: 999px; white-space: nowrap;\" style-hover=\"color: var(--ac);\">Contact<\u002Fa>\n    <\u002Fnav>\n    <span style=\"font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: rgba(242,240,250,0.4);\">© 2025 Matterphor — Virtual solutions for virtually anything.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#8F7BFF&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#8F7BFF&quot;, &quot;#7C5CFF&quot;, &quot;#00E5D1&quot;, &quot;#FF6A3D&quot;], &quot;section&quot;: &quot;Brand&quot;}}\">\nclass Component extends DCLogic {\n  state = { open: { 0: false, 1: false, 2: false } };\n\n  CONTACT_EMAIL = 'info@matterphor.com';\n\n  toggle(i) {\n    this.setState((s) => ({ open: Object.assign({}, s.open, { [i]: !s.open[i] }) }));\n  }\n\n  copyEmail(e) {\n    const host = e.currentTarget;\n    try { if (navigator.clipboard) navigator.clipboard.writeText(this.CONTACT_EMAIL).catch(() => {}); } catch (err) {}\n    const pop = host.querySelector('[data-copied-pop]');\n    if (pop) {\n      pop.style.opacity = '1'; pop.style.transform = 'translateX(-50%) translateY(0)';\n      clearTimeout(this._copyT);\n      this._copyT = setTimeout(() => { pop.style.opacity = '0'; pop.style.transform = 'translateX(-50%) translateY(4px)'; }, 1600);\n    }\n    try { window.location.href = 'mailto:' + this.CONTACT_EMAIL; } catch (err) {}\n  }\n\n  applyAccent() {\n    const ac = this.props.accent || '#8F7BFF';\n    const root = (this.refs && this.refs.rootRef) || document.querySelector('[data-dc-root]');\n    if (root) root.style.setProperty('--ac', ac);\n    document.documentElement.style.setProperty('--ac', ac);\n  }\n\n  componentDidMount() { this.applyAccent(); this.initLiquidPills(); }\n  componentDidUpdate() { this.applyAccent(); }\n\n  initLiquidPills() {\n    const root = (this.refs && this.refs.rootRef) || document.querySelector('[data-dc-root]') || document;\n    root.querySelectorAll('[data-liquidwrap]').forEach((w) => {\n      if (w.__lp) return; w.__lp = 1;\n      const pill = w.querySelector('[data-behindpill]');\n      if (!pill) return;\n      w.addEventListener('mouseenter', () => { if (pill.style.animationName === 'mph-spill') return; pill.style.transform = 'translate(-50%, -50%) scale(0.88)'; pill.style.opacity = '0.94'; pill.style.filter = 'blur(6px)'; });\n      w.addEventListener('mouseleave', () => { if (pill.style.animationName === 'mph-spill') return; pill.style.transform = 'translate(-50%, -50%) scale(1)'; pill.style.opacity = '1'; pill.style.filter = 'none'; });\n      w.addEventListener('pointerdown', () => { pill.style.animation = 'none'; void pill.offsetWidth; pill.style.animation = 'mph-spill 0.6s cubic-bezier(0.22,0.61,0.28,1)'; });\n      pill.addEventListener('animationend', () => { pill.style.animation = 'none'; pill.style.transform = 'translate(-50%, -50%) scale(1)'; pill.style.opacity = '1'; pill.style.filter = 'none'; });\n    });\n  }\n\n  burst(e) {\n    const el = e && e.currentTarget;\n    if (!el || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const r = el.getBoundingClientRect();\n    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;\n    el.animate([{ transform: 'scale(1)' }, { transform: 'scale(0.93)', offset: 0.3 }, { transform: 'scale(1)' }], { duration: 320, easing: 'cubic-bezier(0.2,0.7,0.2,1)' });\n    const rnd = () => 35 + Math.random() * 40;\n    const frags = [];\n    for (let i = 0; i < 16; i++) {\n      const f = document.createElement('div');\n      const s = 5 + Math.random() * 12;\n      f.style.cssText = 'position:fixed;left:' + cx + 'px;top:' + cy + 'px;width:' + s + 'px;height:' + s + 'px;margin:' + (-s / 2) + 'px 0 0 ' + (-s / 2) + 'px;z-index:200;pointer-events:none;background:radial-gradient(circle at 30% 30%, #D9CCFF, #8F7BFF 55%, #5B3ACD);border-radius:' + rnd() + '% ' + rnd() + '% ' + rnd() + '% ' + rnd() + '% / ' + rnd() + '% ' + rnd() + '% ' + rnd() + '% ' + rnd() + '%;box-shadow:0 0 ' + (8 + s) + 'px rgba(143,123,255,0.85);will-change:transform,opacity;';\n      document.body.appendChild(f);\n      frags.push(f);\n      const ang = Math.random() * Math.PI * 2;\n      const dist = (r.width * 0.3) + 50 + Math.random() * 110;\n      const dx = Math.cos(ang) * dist * 1.25, dy = Math.sin(ang) * dist * 0.85;\n      const rot = (Math.random() - 0.5) * 540;\n      f.animate([\n        { transform: 'translate(0,0) scale(0.35) rotate(0deg)', opacity: 1 },\n        { transform: 'translate(' + dx * 0.7 + 'px,' + dy * 0.7 + 'px) scale(1.05) rotate(' + rot * 0.6 + 'deg)', opacity: 0.95, offset: 0.45 },\n        { transform: 'translate(' + dx + 'px,' + (dy + 14) + 'px) scale(0.5) rotate(' + rot + 'deg)', opacity: 0 }\n      ], { duration: 700 + Math.random() * 350, easing: 'cubic-bezier(0.16,0.85,0.3,1)', fill: 'forwards' });\n    }\n    setTimeout(() => { for (const f of frags) f.remove(); }, 1200);\n  }\n\n  goHome(e) {\n    this.burst(e);\n    setTimeout(() => { try { window.location.href = 'index.html'; } catch (err) {} }, 200);\n  }\n\n  renderVals() {\n    const open = this.state.open;\n    const rows = (i) => (open[i] ? '1fr' : '0fr');\n    const chev = (i) => (open[i] ? 'rotate(135deg)' : 'rotate(0deg)');\n    return {\n      open0: open[0], open1: open[1], open2: open[2],\n      rows0: rows(0), rows1: rows(1), rows2: rows(2),\n      chev0: chev(0), chev1: chev(1), chev2: chev(2),\n      toggle0: () => this.toggle(0),\n      toggle1: () => this.toggle(1),\n      toggle2: () => this.toggle(2),\n      copyEmail: (e) => this.copyEmail(e),\n      goHome: (e) => this.goHome(e),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
