  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\n<script src=\"53e0f7fa-75d0-4ca8-9926-917f6a7321af\"><\u002Fscript>\n<script>\n/* TEMP copy-editing tool — double-click any text to edit; persists to\n   localStorage (keyed by DOM path). Editor-only: inert in the public build. */\n(function () {\n  if (!(window.omelette && window.omelette.writeFile)) return; // only inside the editor host\n  var LS = 'mph_copy_overrides_v1';\n  var store = {};\n  try { store = JSON.parse(localStorage.getItem(LS) || '{}'); } catch (e) {}\n  var SEL = 'h1,h2,h3,h4,h5,p,li,figcaption,blockquote,span,a,button';\n  function pathKey(el) {\n    var parts = [], n = el;\n    while (n && n !== document.body && n.parentNode) {\n      parts.unshift([].indexOf.call(n.parentNode.children, n));\n      n = n.parentNode;\n    }\n    return parts.join('.');\n  }\n  function isLeaf(el) {\n    if (el.closest('image-slot')) return false;\n    if (el.closest('[data-work-card]')) return false; // Selected Work copy has its own editor\n    if (el.closest('[data-why-card]')) return false;   // Why cards have their own editor\n    if (el.closest('[data-faq-idx]')) return false;    // FAQ items have their own editor\n    if (el.closest('[data-team-idx]')) return false;   // Team cards have their own editor\n    if (!el.textContent || !el.textContent.trim()) return false;\n    return !el.querySelector(SEL); // deepest text-bearing element only\n  }\n  function save() { try { localStorage.setItem(LS, JSON.stringify(store)); } catch (e) {} }\n  function decorate() {\n    var els = [].filter.call(document.querySelectorAll(SEL), isLeaf);\n    els.forEach(function (el) {\n      if (el.__cedit) return; el.__cedit = 1;\n      var k = pathKey(el);\n      el.__cedBase = el.textContent; // the source-authored text\n      var entry = store[k];\n      if (entry != null) {\n        if (typeof entry !== 'object') { delete store[k]; save(); }           // legacy → source wins\n        else if (entry.base !== el.__cedBase) { delete store[k]; save(); }     // source changed → source wins\n        else if (entry.t != null && entry.t !== el.textContent) { el.textContent = entry.t; }\n      }\n      el.addEventListener('dblclick', function (e) {\n        e.preventDefault(); e.stopPropagation();\n        el.setAttribute('contenteditable', 'true');\n        el.dataset.cedOutline = el.style.outline || '';\n        el.style.outline = '2px solid #8F7BFF';\n        el.style.outlineOffset = '2px';\n        el.style.borderRadius = el.style.borderRadius || '4px';\n        el.focus();\n        var r = document.createRange(); r.selectNodeContents(el);\n        var s = window.getSelection(); s.removeAllRanges(); s.addRange(r);\n      });\n      el.addEventListener('keydown', function (e) {\n        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }\n        else if (e.key === 'Escape') { e.preventDefault(); el.blur(); }\n      });\n      el.addEventListener('blur', function () {\n        if (el.getAttribute('contenteditable') !== 'true') return;\n        el.removeAttribute('contenteditable');\n        el.style.outline = el.dataset.cedOutline || '';\n        store[pathKey(el)] = { t: el.textContent, base: el.__cedBase };\n        save();\n      });\n    });\n  }\n  var t;\n  function run() { clearTimeout(t); t = setTimeout(decorate, 120); }\n  if (document.readyState !== 'loading') run();\n  document.addEventListener('DOMContentLoaded', run);\n  setTimeout(run, 500); setTimeout(run, 1600);\n  new MutationObserver(run).observe(document.documentElement, { childList: true, subtree: true });\n})();\n<\u002Fscript>\n<style>\n  /* html: overflow-x hidden reliably clamps viewport horizontal scroll on mobile (clip does not),\n     which keeps the fixed header from shifting. body stays clip (NOT hidden) so it does not become\n     a vertical scroll container — that would desync window-scroll effects and let the page scroll\n     past the footer into the decorative-orb void. */\n  html { scroll-behavior: smooth; overflow-x: hidden; }\n  body { margin: 0; background: #0A0912; color: #F2F0FA; font-family: 'Space Grotesk', 'Helvetica Neue', Helvetica, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: clip; }\n  a { color: #BDAEFF; text-decoration: none; }\n  a:hover { color: #8F7BFF; }\n  header nav a:hover, footer nav a:hover, footer nav button:hover { color: #8F7BFF !important; }\n  header nav a { white-space: nowrap; }\n  /* Header switches to the burger menu at ≤980px (below where all nav items fit with comfortable\n     spacing). Keep the opaque bar + hidden ambient orbs aligned with that burger state. */\n  @media (max-width: 980px) {\n    header { background: #0A0912 !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }\n    [data-ambient-orb] { display: none !important; }\n  }\n  ::selection { background: #8F7BFF; color: #0A0912; }\n  @keyframes mph-marquee { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }\n  @keyframes mph-rise { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes mph-spill { 0% { transform: translate(-50%, -50%) scale(0.9, 0.9); opacity: 1; } 34% { transform: translate(-50%, -50%) scale(1.3, 1.9); opacity: 0.32; } 100% { transform: translate(-50%, -50%) scale(0.88, 0.88); opacity: 0.94; } }\n  @keyframes mph-spill-out { 0% { transform: translate(-50%, -50%) scale(0.9, 0.9); opacity: 1; } 40% { transform: translate(-50%, -50%) scale(1.18, 1.44); opacity: 0.55; } 100% { transform: translate(-50%, -50%) scale(1.14, 1.4); opacity: 0; } }\n  @keyframes mph-spill-out-round { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 1; } 40% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.55; } 100% { transform: translate(-50%, -50%) scale(1.45); opacity: 0; } }\n  @keyframes mph-textshine { from { background-position: 0% 50%; } to { background-position: 100% 50%; } }\n  @keyframes mph-drift { 0% { transform: translate3d(0,0,0) scale 02Fdiv>\n          <\u002Fdiv>\n        <\u002Ffigure>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"position: relative; height: 26px; width: min(760px, 84vw); margin: 22px auto 0;\">\n      <div ref=\"{{ workWaveRef }}\" style=\"position: absolute; inset: 0; pointer-events: none;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHY ============ -->\n  <section id=\"why\" data-screen-label=\"Why Matterphor\" style=\"position: relative; padding: clamp(72px, 12vh, 140px) clamp(20px, 4vw, 56px); background: linear-gradient(to bottom, #0D0B17, #0A0912); border-top: 1px solid rgba(143,123,255,0.12); scroll-margin-top: 70px;\">\n    <div data-plx=\"0.08\" data-ambient-orb=\"\" style=\"position: absolute; bottom: -120px; left: -160px; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle, rgba(143,123,255,0.12), transparent 70%); pointer-events: none;\"><\u002Fdiv>\n      <div data-cap=\"\" style=\"position: relative; z-index: 6; display: grid; grid-template-columns: repeat(auto-fit, minmax(min(380px, 100%), 1fr)); gap: clamp(32px, 5vw, 72px); align-items: start;\">\n      <div data-reveal=\"\" data-why-intro=\"\" style=\"position: sticky; top: 96px;\">\n        <div style=\"font-family: ui-monospace, Menlo, monospace; font-size: 12px; letter-spacing: 0.28em; color: var(--ac, #8F7BFF); text-transform: uppercase; position: relative; left: 4px\">WHY MATTERPHOR<\u002Fdiv>\n        <h2 style=\"margin: 14px 0 20px; font-size: clamp(36px, 6vw, 72px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.02; text-wrap: balance;\">Straight from the source.<\u002Fh2>\n        <p style=\"margin: 0; max-width: 42ch; color: rgba(242,240,250,0.65); font-size: clamp(15px, 1.6vw, 18px); line-height: 1.65; text-wrap: pretty;\">As a client, you get your application direct from the people building it. You speak with team members fully engaged in your project, from first sketch to final headset.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <sc-for list=\"{{ whyItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div data-reveal=\"left\" data-attract=\"arrow\" data-why-card=\"\" data-why-idx=\"{{ $index }}\" style=\"display: flex; gap: clamp(16px, 2.4vw, 28px); align-items: flex-start; border: 1px solid rgba(143,123,255,0.16); border-radius: 18px; padding: clamp(20px, 2.6vw, 30px); position: relative; z-index: 1; background: rgba(13,11,23,0.55); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); transition: border-color 0.35s ease, transform 0.35s ease, background 0.35s ease, box-shadow 0.35s ease;\" style-hover=\"border-color: rgba(143,123,255,0.55); transform: translateX(10px); background: rgba(143,123,255,0.09); box-shadow: 0 16px 50px rgba(143,123,255,0.14);\">\n            <span style=\"font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: var(--ac, #8F7BFF); padding-top: 5px; letter-spacing: 0.1em;\">{{ item.num }}<\u002Fspan>\n            <div>\n              <h3 data-why-field=\"title\" style=\"margin: 0 0 8px; font-size: clamp(19px, 2vw, 23px); font-weight: 700;\">{{ item.title }}<\u002Fh3>\n              <p data-why-field=\"copy\" style=\"margin: 0; color: rgba(242,240,250,0.62); font-size: 15px; line-height: 1.6; text-wrap: pretty; max-width: 52ch;\">{{ item.copy }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROCESS ============ -->\n  <section id=\"process\" data-screen-label=\"Process\" style=\"padding: clamp(72px, 12vh, 140px) clamp(20px, 4vw, 56px); border-top: 1px solid rgba(143,123,255,0.12); scroll-margin-top: 70px;\">\n    <div data-reveal=\"\" data-cap=\"\" style=\"margin-bottom: clamp(36px, 6vh, 64px);\">\n      <div style=\"font-family: ui-monospace, Menlo, monospace; font-size: 12px; letter-spacing: 0.28em; color: var(--ac, #8F7BFF); text-trans h: 48ch;\">Tell us about your project and we'll get back to you within one working day. Don't be shy, say hello!<\u002Fp>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr)); gap: 14px; margin-top: 28px;\">\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 12px; letter-spacing: 0.06em; color: rgba(242,240,250,0.6); margin-bottom: 6px;\">Name<\u002Fspan>\n            <input type=\"text\" data-cf=\"name\" sc-camel-on-input=\"{{ checkContact }}\" placeholder=\"Jane Smith\" style=\"width: 100%; box-sizing: border-box; padding: 13px 16px; border-radius: 10px; border: 1px solid rgba(143,123,255,0.22); background: rgba(242,240,250,0.05); color: #F2F0FA; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.25s ease, background 0.25s ease;\" style-focus=\"border-color: var(--ac, #8F7BFF); background: rgba(143,123,255,0.08);\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 12px; letter-spacing: 0.06em; color: rgba(242,240,250,0.6); margin-bottom: 6px;\">Email<\u002Fspan>\n            <input type=\"email\" data-cf=\"email\" sc-camel-on-input=\"{{ checkContact }}\" placeholder=\"jane@janesmith.com\" style=\"width: 100%; box-sizing: border-box; padding: 13px 16px; border-radius: 10px; border: 1px solid rgba(143,123,255,0.22); background: rgba(242,240,250,0.05); color: #F2F0FA; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.25s ease, background 0.25s ease;\" style-focus=\"border-color: var(--ac, #8F7BFF); background: rgba(143,123,255,0.08);\">\n          <\u002Flabel>\n          <label style=\"display: block; grid-column: 1 / -1;\">\n            <span style=\"display: block; font-size: 12px; letter-spacing: 0.06em; color: rgba(242,240,250,0.6); margin-bottom: 6px;\">Message<\u002Fspan>\n            <textarea rows=\"4\" data-cf=\"message\" sc-camel-on-input=\"{{ checkContact }}\" placeholder=\"Tell us what you need!\" style=\"width: 100%; box-sizing: border-box; padding: 13px 16px; border-radius: 10px; border: 1px solid rgba(143,123,255,0.22); background: rgba(242,240,250,0.05); color: #F2F0FA; font-family: inherit; font-size: 14px; outline: none; resize: vertical; transition: border-color 0.25s ease, background 0.25s ease;\" style-focus=\"border-color: var(--ac, #8F7BFF); background: rgba(143,123,255,0.08);\"><\u002Ftextarea>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div data-form-err=\"\" style=\"text-align: center; margin-top: 18px; color: #FFB4C6; font-size: 13.5px; opacity: 0; transition: opacity 0.3s ease;\">Please add your name, email and a message.<\u002Fdiv>\n        <div class=\"h-captcha\" data-captcha=\"true\" data-theme=\"dark\" style=\"margin: 16px auto 0; text-align: center;\"><\u002Fdiv>\n        <span style=\"display: block; text-align: center; margin-top: 16px;\"><span data-liquidwrap=\"\" data-noauto=\"\" style=\"position: relative; display: inline-flex;\"><span aria-hidden=\"true\" data-behindpill=\"\" data-submit-pill=\"\" style=\"position: absolute; left: 50%; top: 50%; width: 88%; height: 56%; transform: translate(-50%, -50%); background: #6E4FD8; border-radius: 999px; pointer-events: none; z-index: 0; opacity: 0; transition: transform 0.45s cubic-bezier(0.2,0.7,0.2,1), opacity 0.45s ease, filter 0.45s ease;\"><\u002Fspan><button sc-camel-on-click=\"{{ submitContact }}\" data-submit-btn=\"\" style=\"padding: 15px 44px; border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(180,160,255,0.05)); color: #FFFFFF; font-weight: 700; position: relative; overflow: hidden; z-index: 1; -webkit-backdrop-filter: blur(2px) saturate(180%) brightness(1.08) url('#mph-liquid'); backdrop-filter: blur(2px) saturate(180%) brightness(1.08) url('#mph-liquid'); box-shadow: 0 16px 40px -12px rgba(90,60,200,0.5), inset 0 0 0 1px rgba(255,255,255,0.34), inset 0 1px 2px rgba(255,255,255,0.58), inset 2px 3px 7px -2px rgba(255,255,255,0.42), inset -2px -3px 9px -2px rgba(130,100,245,0.55), inset 0 -11px 20px -10px rgba(255,255,255,0.35); font-size: 15px; border: 0; cursor: pointer; font-family: inherit; filter: brightness(0.5) saturate(0.65); transition: transform 0.3s cubic-bezier(0.2,0.7,0.2,1), box-shadow 0.3s ease, filter 0.35s ease;\" style-hover=\"transform: translateY(-2px) scale(1.03); box-shadow: 0 24px 52px -12px rgba(120,90,240,0.6), inset 0 0 0 1px rgba(255,255,255,0.44), inset 0 1px 2px rgba(255,255,255,0.64), inset 2px 3px 8px -2px rgba(255,255,255,0.48), inset -2px -3px 10px -2px rgba(140,108,250,0.6), inset 0 -12px 22px -10px rgba(255,255,255,0.42);\">Submit<\u002Fbutton><\u002Fspan><\u002Fspan>\n        <div style=\"margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(143,123,255,0.16); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px;\">\n          <div>\n            <div style=\"font-weight: 700; font-size: 15px;\">Message us directly<\u002Fdiv>\n            <div style=\"font-size: 13px; color: rgba(242,240,250,0.55); margin-top: 2px;\">Drop us an email to get the conversation started.<\u002Fdiv>\n          <\u002Fdiv>\n          <span data-copy-email=\"\" sc-camel-on-click=\"{{ copyEmail }}\" style=\"position: relative; font-weight: 700; font-size: 15px; color: var(--ac, #8F7BFF); cursor: pointer;\" style-hover=\"color: #FFFFFF;\">info@matterphor.com<span data-copied-pop=\"\" style=\"position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(4px); opacity: 0; pointer-events: none; background: var(--ac, #8F7BFF); color: #0A0912; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 5px 10px; border-radius: 6px; white-space: nowrap; transition: opacity 0.25s ease, transform 0.25s ease;\">Copied to clipboard<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ contactSent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align: center; padding: clamp(24px, 6vh, 60px) 0;\">\n          <div style=\"font-family: ui-monospace, Menlo, monospace; font-size: 12px; letter-spacing: 0.28em; color: var(--ac, #8F7BFF); text-transform: uppercase;\">Message sent<\u002Fdiv>\n          <h2 style=\"margin: 16px 0 0; font-size: clamp(26px, 3.6vw, 40px); font-weight: 700; letter-spacing: -0.02em;\">Thanks for reaching out.<\u002Fh2>\n          <p style=\"margin: 14px auto 0; max-width: 42ch; color: rgba(242,240,250,0.65); font-size: 15px; line-height: 1.6;\">We've got your message and we'll be in touch shortly.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#8F7BFF&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#8F7BFF&quot;, &quot;#7C5CFF&quot;, &quot;#00E5D1&quot;, &quot;#FF6A3D&quot;], &quot;section&quot;: &quot;Brand&quot;}, &quot;motion&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;full&quot;, &quot;options&quot;: [&quot;full&quot;, &quot;subtle&quot;], &quot;tsType&quot;: &quot;'full' | 'subtle'&quot;, &quot;section&quot;: &quot;Motion&quot;}, &quot;heroVideo&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = { faqOpen: -1, menuOpen: false, isMobile: false, reelOpen: false, heroDone: false, contactOpen: false, contactSent: false, teamOpen: false, teamCardIdx: -1 };\n\n  componentDidMount() {\n    this.rootEl = this.refs && this.refs.rootRef;\n    this.applyAccent();\n\n    // close any open team bio when clicking outside a card\n    this.onDocClickTeam = (e) => {\n      if (this.state.teamCardIdx === -1) return;\n      if (e.target && e.target.closest && e.target.closest('[data-reach-card]')) return;\n      this.setState({ teamCardIdx: -1 });\n    };\n    document.addEventListener('click', this.onDocClickTeam, true);\n\n    // scroll-spy: light the nav dot for whichever section owns the viewport\n    this.initNavSpy();\n    // liquid-glass buttons: shrink the purple behind-pill on hover so the glass diffuses it\n    this.initLiquidPills();\n\n    // responsive nav\n    this.mq = window.matchMedia('(max-width: 980px)');\n    this.onMq = () => { this.setState({ isMobile: this.mq.matches }); if (this.setAmbientVisibility) this.setAmbientVisibility(this.mq.matches); };\n    this.mq.addEventListener('change', this.onMq);\n    this.onMq();\n\n    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches || this.props.motion === 'subtle';\n\n    // --- scroll reveals ---\n    const root = this.rootEl || document;\n    const els = Array.from(root.querySelectorAll('[data-reveal]'));\n    if (!reduced) {\n      this.io = new IntersectionObserver((entries) => {\n        for (const e of entries) {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            this.io.unobserve(e.target);\n          }\n        }\n      }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });\n      const groupIdx = new Map();\n      for (const el of els) {\n        const r = el.getBoundingClientRect();\n        if (r.top < window.innerHeight * 0.92) continue; // already visible — never hide\n        const v = el.getAttribute('data-reveal');\n        const t = v === 'left' ? 'translateX(-44px)' : v === 'right' ? 'translateX(44px)' : v === 'scale' ? 'translateY(28px) scale(0.94)' : 'translateY(36px)';\n        const p = el.parentElement;\n        const gi = groupIdx.get(p) || 0;\n        groupIdx.set(p, gi + 1);\n        el.style.transitionDelay = Math.min(gi * 90, 360) + 'ms';\n        el.style.opacity = '0';\n        el.style.transform = t;\n        el.style.transition = 'opacity 0.85s cubic-bezier(0.2,0.7,0.2,1), transform 0.85s cubic-bezier(0.2,0.7,0.2,1)';\n        el.style.willChange = 'opacity, transform';\n        this.io.observe(el);\n      }\n      // safety: reveal everything if something goes wrong\n      this.revealFallback = setTimeout(() => {\n        for (const el of els) { el.style.opacity = '1'; el.style.transform = 'none'; }\n      }, 12000);\n    }\n\n    // --- parallax (transform-only, rAF-throttled) ---\n    if (!reduced) {\n      const plxEls = Array.from(root.querySelectorAll('[data-plx]')).map((el) => ({ el, speed: parseFloat(el.getAttribute('data-plx')) || 0 }));\n      let ticking = false;\n      const update = () => {\n        ticking = false;\n        const vh = window.innerHeight;\n        for (const { el, speed } of plxEls) {\n          const r = el.getBoundingClientRect();\n          if (r.bottom < -100 || r.top > vh + 100) continue;\n          const center = r.top + r.height / 2 - vh / 2;\n          el.style.transform = 'translate3d(0,' + (center * speed).toFixed(1) + 'px,0)';\n        }\n      };\n      this.onScroll = () => { if (!ticking) { ticking = true; requestAnimationFrame(update); } };\n      window.addEventListener('scroll', this.onScroll, { passive: true });\n      update();\n    }\n\n    // pricing cards: plain JS hover, independent of the scroll-reveal system —\n    // the reveal observer sets an inline transform on reveal, which would\n    // otherwise fight a CSS-driven :hover transform on the same property\n    for (const card of Array.from(root.querySelectorAll('[data-price-card]'))) {\n      const strong = card.getAttribute('data-price-card') === 'strong';\n      card.addEventListener('mouseenter', () => {\n        card.style.transform = 'translateY(-6px)';\n        card.style.borderColor = strong ? 'rgba(143,123,255,0.7)' : 'rgba(143,123,255,0.45)';\n        card.style.boxShadow = strong ? '0 26px 70px rgba(143,123,255,0.4)' : '0 26px 70px rgba(143,123,255,0.2)';\n      });\n      card.addEventListener('mouseleave', () => {\n        card.style.transform = 'none';\n        card.style.borderColor = strong ? 'rgba(143,123,255,0.4)' : 'rgba(143,123,255,0.2)';\n        card.style.boxShadow = strong ? '0 0 60px rgba(143,123,255,0.12) inset' : 'none';\n      });\n    }\n\n    // fast, instant purple hover — independent of the orb system so it never\n    // waits on absorption count (used where the orbs just dance decoratively)\n    for (const card of Array.from(root.querySelectorAll('[data-purple-hover]'))) {\n      const orig = { bg: card.style.getPropertyValue('background') || '', borderColor: getComputedStyle(card).borderTopColor };\n      card.addEventListener('mouseenter', () => {\n        // glow only — no purple fill / text flip\n        card.style.setProperty('transition', 'border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease', 'important');\n        card.style.setProperty('border-color', 'rgba(143,123,255,0.6)', 'important');\n        card.style.setProperty('box-shadow', '0 0 34px rgba(143,123,255,0.4), 0 18px 60px rgba(143,123,255,0.18)', 'important');\n        card.style.setProperty('transform', 'translateY(-4px)', 'important');\n      });\n      card.addEventListener('mouseleave', () => {\n        card.style.removeProperty('box-shadow');\n        card.style.removeProperty('transform');\n        card.style.removeProperty('transition');\n        if (orig.borderColor) card.style.setProperty('border-color', orig.borderColor); else card.style.removeProperty('border-color');\n      });\n    }\n\n    if (!reduced && this.rootEl) this.initAmbient(this.rootEl);\n    const teamSec = root.querySelector('#team');\n    if (!reduced && teamSec) this.initSynapse(teamSec);\n    const contactH = root.querySelector('#contact h2');\n    if (!reduced && contactH) this.initTextDisrupt(contactH);\n    const heroH = root.querySelector('h1');\n    if
