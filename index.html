  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"color: rgba(242,240,250,0.55); padding: 8px 4px; border-radius: 999px; white-space: nowrap; transition: color 0.25s ease, background 0.25s ease;\" style-hover=\"color: var(--ac, #8F7BFF);\">Legal<\u002Fa>\n      <button sc-camel-on-click=\"{{ openContactBurst }}\" style=\"color: rgba(242,240,250,0.55); padding: 8px 4px; border-radius: 999px; white-space: nowrap; background: none; border: 0; cursor: pointer; font-family: inherit; font-size: clamp(11.5px, 2.9vw, 13px); transition: color 0.25s ease, background 0.25s ease;\" style-hover=\"color: var(--ac, #8F7BFF);\">Contact<\u002Fbutton>\n    <\u002Fnav>\n    <span style=\"font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: rgba(242,240,250,0.4);\">© 2025 Matterphor — Virtual solutions for virtually anything.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ============ SHOWREEL MODAL ============ -->\n  <sc-if value=\"{{ reelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeReel }}\" style=\"position: fixed; inset: 0; z-index: 120; background: rgba(6,5,12,0.92); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; padding: clamp(16px, 4vw, 64px); cursor: pointer;\">\n      <div style=\"position: relative; width: min(1200px, 100%); aspect-ratio: 16 / 9; border-radius: 16px; overflow: hidden; border: 1px solid rgba(143,123,255,0.35); box-shadow: 0 40px 120px rgba(143,123,255,0.25); cursor: auto;\">\n        <iframe src=\"https://www.youtube.com/embed/3QSD5xTIiHs?autoplay=1&amp;rel=0\" title=\"Matterphor showreel\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen\" sc-camel-referrer-policy=\"strict-origin-when-cross-origin\" sc-camel-allow-full-screen=\"{{ true }}\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; border: 0;\"><\u002Fiframe>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ closeReel }}\" aria-label=\"Close\" s ax-width: 20ch; text-wrap: balance;\">Feel free to send our friendly team a message.<\u002Fh2>\n        <p style=\"margin: 12px 0 0; color: rgba(242,240,250,0.6); font-size: 15px; line-height: 1.6; max-width: 48ch;\">Tell us about your project and we'll get back to you within one working day. Don't be shy, say hello!<\u002Fp>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr)); gap: 14px; margin-top: 28px;\">\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 12px; letter-spacing: 0.06em; color: rgba(242,240,250,0.6); margin-bottom: 6px;\">Name<\u002Fspan>\n            <input type=\"text\" data-cf=\"name\" sc-camel-on-input=\"{{ checkContact }}\" placeholder=\"Jane Smith\" style=\"width: 100%; box-sizing: border-box; padding: 13px 16px; border-radius: 10px; border: 1px solid rgba(143,123,255,0.22); background: rgba(242,240,250,0.05); color: #F2F0FA; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.25s ease, background 0.25s ease;\" style-focus=\"border-color: var(--ac, #8F7BFF); background: rgba(143,123,255,0.08);\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 12px; letter-spacing: 0.06em; color: rgba(242,240,250,0.6); margin-bottom: 6px;\">Email<\u002Fspan>\n            <input type=\"email\" data-cf=\"email\" sc-camel-on-input=\"{{ checkContact }}\" placeholder=\"jane@janesmith.com\" style=\"width: 100%; box-sizing: border-box; padding: 13px 16px; border-radius: 10px; border: 1px solid rgba(143,123,255,0.22); background: rgba(242,240,250,0.05); color: #F2F0FA; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.25s ease, background 0.25s ease;\" style-focus=\"border-color: var(--ac, #8F7BFF); background: rgba(143,123,255,0.08);\">\n          <\u002Flabel>\n          <label style=\"display: block; grid-column: 1 / -1;\">\n            <span style=\"display: block; font-size: 12px; letter-spacing: 0.06em; color: rgba(242,240,250,0.6); margin-bottom: 6px;\">Message<\u002Fspan>\n            <textarea rows=\"4\" data-cf=\"message\" sc-camel-on-input=\"{{ checkContact }}\" placeholder=\"Tell us what you need!\" style=\"width: 100%; box-sizing: border-box; padding: 13px 16px; border-radius: 10px; border: 1px solid rgba(143,123,255,0.22); background: rgba(242,240,250,0.05); color: #F2F0FA; font-family: inherit; font-size: 14px; outline: none; resize: vertical; transition: border-color 0.25s ease, background 0.25s ease;\" style-focus=\"border-color: var(--ac, #8F7BFF); background: rgba(143,123,255,0.08);\"><\u002Ftextarea>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div data-form-err=\"\" style=\"text-align: center; margin-top: 18px; color: #FFB4C6; font-size: 13.5px; opacity: 0; transition: opacity 0.3s ease;\">Please add your name, email and a message.<\u002Fdiv>\n        <div class=\"h-captcha\" data-captcha=\"true\" data-theme=\"dark\" style=\"margin: 16px auto 0; text-align: center;\"><\/div>\n        <span style=\"display: block; text-align: center; margin-top: 16px;\"><span data-liquidwrap=\"\" data-noauto=\"\" style=\"position: relative; display: inline-flex;\"><span aria-hidden=\"true\" data-behindpill=\"\" data-submit-pill=\"\" style=\"position: absolute; left: 50%; top: 50%; width: 88%; height: 56%; transform: translate(-50%, -50%); background: #6E4FD8; border-radius: 999px; pointer-events: none; z-index: 0; opacity: 0; transition: transform 0.45s cubic-bezier(0.2,0.7,0.2,1), opacity 0.45s ease, filter 0.45s ease;\"><\u002Fspan><button sc-camel-on-click=\"{{ submitContact }}\" data-submit-btn=\"\" style=\"padding: 15px 44px; border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(180,160,255,0.05)); color: #FFFFFF; font-weight: 700; position: relative; overflow: hidden; z-index: 1; -webkit-backdrop-filter: blur(2px) saturate(180%) brightness(1.08) url('#mph-liquid'); backdrop-filter: blur(2px) saturate(180%) brightness(1.08) url('#mph-liquid'); box-shadow: 0 16px 40px -12px rgba(90,60,200,0.5), inset 0 0 0 1px rgba(255,255,255,0.26), inset 0 1px 2px rgba(255,255,255,0.44), inset 2px 3px 7px -2px rgba(255,255,255,0.32), inset -2px -3px 9px -2px rgba(130,100,245,0.55), inset 0 -11px 20px -10px rgba(255,255,255,0.27); font-size: 15px; border: 0; cursor: pointer; font-family: inherit; filter: brightness(0.5) saturate(0.65); transition: transform 0.3s cubic-bezier(0.2,0.7,0.2,1), box-shadow 0.3s ease, filter 0.35s ease;\" style-hover=\"transform: translateY(-2px) scale(1.03); box-shadow: 0 24px 52px -12px rgba(120,90,240,0.6), inset 0 0 0 1px rgba(255,255,255,0.34), inset 0 1px 2px rgba(255,255,255,0.50), inset 2px 3px 8px -2px rgba(255,255,255,0.37), inset -2px -3px 10px -2px rgba(140,108,250,0.6), inset 0 -12px 22px -10px rgba(255,255,255,0.32);\">Submit<\u002Fbutton><\u002Fspan><\u002Fspan>\n        <div style=\"margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(143,123,255,0.16); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px;\">\n          <div>\n            <div style=\"font-weight: 700; font-size: 15px;\">Message us directly<\u002Fdiv>\n            <div style=\"font-size: 13px; color: rgba(242,240,250,0.55); margin-top: 2px;\">Drop us an email to get the conversation started.<\u002Fdiv>\n          <\u002Fdiv>\n          <span data-copy-email=\"\" sc-camel-on-click=\"{{ copyEmail }}\" style=\"position: relative; font-weight: 700; font-size: 15px; color: var(--ac, #8F7BFF); cursor: pointer;\" style-hover=\"color: #FFFFFF;\">info@matterphor.com<span data-copied-pop=\"\" style=\"position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(4px); opacity: 0; pointer-events: none; background: var(--ac, #8F7BFF); color: #0A0912; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 5px 10px; border-radius: 6px; white-space: nowrap; transition: opacity 0.25s ease, transform 0.25s ease;\">Copied to clipboard<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ contactSent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align: center; padding: clamp(24px, 6vh, 60px) 0;\">\n          <div style=\"font-family: ui-monospace, Menlo, monospace; font-size: 12px; letter-spacing: 0.28em; color: var(--ac, #8F7BFF); text-transform: uppercase;\">Message sent<\u002Fdiv>\n          <h2 style=\"margin: 16px 0 0; font-size: clamp(26px, 3.6vw, 40px); font-weight: 700; letter-spacing: -0.02em;\">Thanks for reaching out.<\u002Fh2>\n          <p style=\"margin: 14px auto 0; max-width: 42ch; color: rgba(242,240,250,0.65); font-size: 15px; line-height: 1.6;\">We've got your message and we'll be in touch shortly.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#8F7BFF&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#8F7BFF&quot;, &quot;#7C5CFF&quot;, &quot;#00E5D1&quot;, &quot;#FF6A3D&quot;], &quot;section&quot;: &quot;Brand&quot;}, &quot;motion&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;full&quot;, &quot;options&quot;: [&quot;full&quot;, &quot;subtle&quot;], &quot;tsType&quot;: &quot;'full' | 'subtle'&quot;, &quot;section&quot;: &quot;Motion&quot;}, &quot;heroVideo&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = { faqOpen: -1, menuOpen: false, isMobile: false, reelOpen: false, heroDone: false, contactOpen: false, contactSent: false, teamOpen: false, teamCardIdx: -1 };\n\n  // ── Contact form config ──────────────────────────────────────────────\n  // Paste a Web3Forms access key (free — get one at web3forms.com) to have\n  // submissions delivered straight to your inbox. Leave blank and the form\n  // falls back to opening the visitor's mail app pre-filled to CONTACT_EMAIL.\n  CONTACT_ACCESS_KEY = 'fe3635bf-d631-473a-85f9-ebb50269b80c';\n  CONTACT_EMAIL = 'info@matterphor.com';\n\n  // ── Published content ────────────────────────────────────────────────\n  // Baked-in edits made in the editor, so the public build matches. These are\n  // the base; any live localStorage edit layers on top (see _pubMerge).\n  PUB = {\n    'mph_team_copy_v1': {\n      '0': { role: 'co-founder - head of production', bio: 'David combines functional, visual, and technical expertise to truly understand our clients. Bridging client stakeholders and our internal team, he has led projects to successful delivery for over a decade.' },\n      '1': { name: 'Jordan Collins', role: 'co-founder - head of design', bio: 'Jordan has been an artist in the XR space since the beginning, building the vision and the worlds, designing the workflows, and leading art teams to deliver products that run as beautifully as they look.' },\n      '2': { role: 'co-founder - head of engineering', bio: 'Ci\\u00e1ran brings over a decade of experience to our technical direction, owning the architecture, tooling, and workflows that let a small team ship polished experiences fast, without cutting corners.' },\n      '3': { role: 'senior clinical advisor (FRCS C-TH,Mb,bs,mrcs,pgdip)', bio: 'A Fellow of the Royal College of Surgeons (FRCS C-Th). Jeesoo completed a highly competitive training programme in London. She has a keen interest in surgical education, robotic surgery, simulation and interventional bronchoscopy.' }\n    },\n    'mph_why_copy_v1': {\n      '1': { title: 'No unnecessary costs', copy: 'We keep everything lean and ship you exactly what you need - no bloat. If you need a platform service or a feature that requires a subscription, we either build it ourselves or shop around for you to get you the best results for your budget.' },\n      '3': { copy: 'Lean, agile and deeply multi-skilled. With purpose-built tools and workflows, we build with confidence and speed, whatever the design.' }\n    },\n    'mph_faq_copy_v1': {\n      '0': { a: 'For standard process or compliance training, your project can be live in no time. Bespoke experiences will take longer. You are always involved every step of the way, so feedback lands while it\\u2019s cheap to act on.' },\n      '1': { a: 'Projects grow with you. We can expand scope and add features whenever it suits, our design team makes it seamless.' },\n      '2': { a: 'We build for and recommend the most suitable mobile headsets for your budget and needs, this usually lands in the Meta Quest lineup.' },\n      '4': { a: 'Swift, friendly support via email, chat and phone. from the same team that built your experience.' }\n    },\n    'mph_work_copy_v1': {\n      '0': { title: 'Driving safety', tag: 'AWARENESS', desc: 'A fully immersive VR experience for a world leading logistics company, teaching their drivers to be more mindful of their surroundings. An experience they won\\u2019t forget.' },\n      '1': { tag: 'EDUCATIONAL', desc: 'Shrink down and transport yourself inside a living body of a patient suffering from NF1. Discover the tiny biological mechanisms that grow, fight and react all around you, taking a learning experience to a whole new level.' },\n      '2': { tag: 'TRAINING', desc: 'Fully immersive VR medical training where you\\u2019re guided through each process. When you\\u2019re confident, remove all the guides and test yourself with full reporting and results for feedback. No real patients or expensive equipment needed.' },\n      '3': { title: 'Arabica farm', tag: 'Experiential', desc: 'A beautiful VR experience for a leading coffee brand which transports you to the heart of Colombia. You learn, interact and play as you\\u2019re fully immersed in a love-crafted Arabica farm. You can almost smell the coffee.' },\n      '4': { title: 'Out in the field', tag: 'DIGITAL TWIN', desc: 'Expensive equipment can be in short supply. This VR experience guides you through the process of the tooling and assembly of an advanced mobile satellite unit.' },\n      '5': { title: 'High flying', tag: 'IMMERSIVE BRANDING', desc: 'Seeing is believing. Fully immersive experiences take your clients exactly where they need to be to see your vision. Conversations are easier when the product is living and breathing right in front of their eyes.' },\n      '6': { title: 'Hub spaces', tag: 'TEAM MEETINGS', desc: 'Multiple experiences brought together to whole teams with a platform and a lobby. Join, meet and gather together to jump into virtually any experience.' },\n      '7': { title: 'Oil & gas', tag: 'MULTIPLAYER TRAINING', desc: 'Multiplayer experience for a world leading oil & gas company, teaching complex engineering tasks and cooperation before you get shipped out to an oilrig.' },\n      '8': { title: 'Kick it', desc: 'Sometimes, it\\u2019s just about fun. This VR experience was designed to gather the crowds at an event booth, intriguing them to come have a play while the rest of the crowd enjoys watching on a big screen.' }\n    },\n    // Vimeo overrides retired — cards now play the local mp4s baked into the\n    // project data (assets/*.mp4). Editor \"Video\" button edits still layer on top.\n    'mph_work_videos_v1': {}\n  };\n\n  // Retired Vimeo links: silently dropped from localStorage so old editor\n  // sessions fall back to the local mp4s too (exact-match, other edits survive).\n  STALE_VIDEO_URLS = [\n    'https://vimeo.com/1209814285?fl=tl&fe=ec',\n    'https://vimeo.com/1209692946?share=copy&fl=sv&fe=ci',\n    'https://vimeo.com/1209813831?fl=tl&fe=ec',\n    'https://vimeo.com/1209812940?fl=tl&fe=ec',\n    'https://vimeo.com/1209830530?fl=tl&fe=ec',\n
